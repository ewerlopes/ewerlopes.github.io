{{ range .Data.Pages.GroupByDate "2006" }}
<div class="posts-year-group">
    <h3>{{ .Key }}</h3>
    <ul>
    {{ range .Pages }}
        <li>
            <span class="date">{{ .Date.Format (default "Jan 2" .Site.Params.abbrDateFmt) }}</span>
            <span class="title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></span>
        </li>
    {{ end }}
    </ul>
</div>
{{ end }}
