{{ $title := .Title | lower }}
<div class="section-heading">
    <span class="heading-label">$ ls </span><span class="heading-value">{{ $title }}/</span>
</div>
<ul class="term-cloud">
{{ range $key, $value := .Data.Terms.ByCount }}
    {{ if ($value.Name) }}
    <li>
        <a href="{{ $title | relURL }}/{{ $value.Name | urlize }}">
            <span>{{ $value.Name }}</span>
            <span class="term-count">({{ $value.Count }})</span>
        </a>
    </li>
    {{ end }}
{{ end }}
</ul>
